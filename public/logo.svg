<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="sail-main" x1="38" y1="10" x2="82" y2="65" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#bae6fd" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="sail-jib" x1="38" y1="18" x2="14" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e0f2fe" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#7dd3fc" stop-opacity="0.75"/>
    </linearGradient>
    <linearGradient id="hull-fill" x1="50" y1="63" x2="50" y2="78" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0c2340" stop-opacity="1"/>
      <stop offset="100%" stop-color="#071629" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <!-- Ship tilted ~14deg clockwise — pitching into storm -->
  <g transform="rotate(14, 50, 66)">
    <!-- Mast -->
    <line x1="38" y1="66" x2="38" y2="10" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
    <!-- Main sail -->
    <path d="M38 12 L38 64 L86 57 Z" fill="url(#sail-main)"/>
    <!-- Jib -->
    <path d="M38 19 L38 62 L13 50 Z" fill="url(#sail-jib)"/>
    <!-- Hull body -->
    <path d="M8 66 L92 66 Q92 69 86 73 Q68 80 50 80 Q32 80 14 73 Q8 69 8 66 Z"
          fill="url(#hull-fill)" stroke="white" stroke-width="1.6" stroke-linejoin="round"/>
    <!-- Deck line -->
    <line x1="10" y1="66" x2="90" y2="66" stroke="white" stroke-width="0.9" stroke-linecap="round" opacity="0.45"/>
  </g>

  <!-- Waves stay horizontal — ship tilts, sea doesn't -->
  <!-- Wave 1 — foreground, aggressive -->
  <path d="M0 76 Q10 67 20 76 Q30 85 40 76 Q50 67 60 76 Q70 85 80 76 Q88 69 100 76"
        stroke="white" stroke-width="2.2" stroke-linecap="round" fill="none" opacity="0.9"/>

  <!-- Wave 2 — mid, teal -->
  <path d="M0 84 Q11 76 22 84 Q33 92 44 84 Q55 76 66 84 Q77 92 88 84 Q94 80 100 84"
        stroke="#38bdf8" stroke-width="1.6" stroke-linecap="round" fill="none" opacity="0.65"/>

  <!-- Wave 3 — deep, ocean -->
  <path d="M0 91 Q13 85 26 91 Q39 97 52 91 Q65 85 78 91 Q90 96 100 91"
        stroke="#0ea5e9" stroke-width="1.1" stroke-linecap="round" fill="none" opacity="0.45"/>
</svg>
